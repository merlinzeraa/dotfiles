[colors]
background = #0f1222
background-alt = #1f2444
foreground = #e3feef
primary = #b39af5
secondary = #9573f5
alert = #f882ff
disabled = #707880

[bar/example]
bottom = true
width = 100%
height = 18
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 0

separator = " "
separator-foreground = ${colors.disabled}

font-0 = monospace:size=8;2
font-1 = IosevkaTerm Nerd Font:size=8;2

modules-left = xworkspaces
modules-right = pulseaudio battery date time

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 1

label-occupied = %name%
label-occupied-background = ${colors.background-alt}
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>
label-volume = " VOL %percentage%% "

label-muted = " muted "
label-muted-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1

date = " %Y-%m-%d "
label = %date%

[module/time]
type = internal/date
interval = 1

date = " %H:%M "
date-alt = " %H:%M:%S "
label = %date%

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = ADP0
poll-interval = 5

format-charging = <label-charging>
label-charging = " ůĪźč %percentage%% "

format-discharging = <label-discharging>
label-discharging = " ůįĀŅ %percentage%% "

format-full = <label-full>
label-full = " ůįĀĻ %percentage%% "

format-low = <label-low>
label-low = " ůįāÉ %percentage%% "

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
bottom = true
